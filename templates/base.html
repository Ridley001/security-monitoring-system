<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Monitor — {% block title %}{% endblock %}</title>

    <!-- Bootstrap CSS (gives us beautiful styling for free) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Our custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

<!-- ── SIDEBAR ──────────────────────────────────────────────── -->
<div class="sidebar" id="sidebar">

    <!-- Logo / Brand -->
    <div class="sidebar-brand">
        <i class="bi bi-shield-lock-fill"></i>
        <span>SecureWatch</span>
    </div>

    <!-- Navigation Links -->
    <nav class="sidebar-nav">
        <a href="{{ url_for('dashboard') }}"
           class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="#"
           class="nav-link {% if request.endpoint == 'alerts' %}active{% endif %}">
            <i class="bi bi-exclamation-triangle-fill"></i> Alerts
        </a>

        <a href="#"
           class="nav-link {% if request.endpoint == 'logs' %}active{% endif %}">
            <i class="bi bi-journal-text"></i> Logs
        </a>

        <a href="#"
           class="nav-link {% if request.endpoint == 'blocked' %}active{% endif %}">
            <i class="bi bi-slash-circle-fill"></i> Blocked IPs
        </a>

        <a href="#"
           class="nav-link {% if request.endpoint == 'live_monitor' %}active{% endif %}">
            <i class="bi bi-activity"></i> Live Monitor
        </a>
    </nav>

    <!-- Logout at the bottom -->
    <div class="sidebar-footer">
        <a href="{{ url_for('logout') }}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> Logout
        </a>
    </div>
</div>

<!-- ── MAIN CONTENT ──────────────────────────────────────────── -->
<div class="main-content">

    <!-- Top Header Bar -->
    <div class="top-header">
        <h5 class="mb-0">{% block page_title %}{% endblock %}</h5>
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-person-circle fs-5"></i>
            <span>{{ session.get('user', 'Admin') }}</span>
        </div>
    </div>

    <!-- Page Content -->
    <div class="content-area">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}

</body>
</html>
