<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .portal-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .portal-icon {
            font-size: 64px;
            color: #58a6ff;
            margin-bottom: 20px;
        }
        .btn-portal {
            background: linear-gradient(135deg, #58a6ff, #1a73e8);
            border: none;
            padding: 12px 40px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .btn-portal:hover {
            opacity: 0.9;
            color: white;
        }
        .monitored-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(63,185,80,0.1);
            border: 1px solid rgba(63,185,80,0.3);
            color: #3fb950;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 20px;
        }
        .pulse {
            width: 8px;
            height: 8px;
            background: #3fb950;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="portal-card">

        <div class="portal-icon">
            <i class="bi bi-building"></i>
        </div>

        <h2 style="font-weight:700; margin-bottom:8px;">
            TechCorp Employee Portal
        </h2>
        <p style="color:rgba(255,255,255,0.6); margin-bottom:0;">
            Internal company portal for authorized employees only.
          
        </p>

        <a href="{{ url_for('login') }}" class="btn-portal">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Employee Login
        </a>

        <div>
            <span class="monitored-badge">
                <span class="pulse"></span>
                Security Monitoring Active
            </span>
        </div>

    </div>
</body>
</html>
