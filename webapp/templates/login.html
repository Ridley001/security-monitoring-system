<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg,
                #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            color: white;
        }
        .form-control {
            background: rgba(255,255,255,0.08) !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
            color: white !important;
            border-radius: 8px;
            padding: 12px;
        }
        .form-control:focus {
            border-color: #58a6ff !important;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15) !important;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .btn-login {
            background: linear-gradient(135deg, #58a6ff, #1a73e8);
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 15px;
        }
        .btn-login:hover { opacity: 0.9; color: white; }
        .alert {
            border-radius: 8px;
            font-size: 13px;
            border: none;
        }
        .hint-box {
            background: rgba(88,166,255,0.08);
            border: 1px solid rgba(88,166,255,0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">

        <!-- Logo -->
        <div style="text-align:center; margin-bottom:28px;">
            <i class="bi bi-building"
               style="font-size:40px; color:#58a6ff;"></i>
            <h4 style="margin-top:10px; font-weight:700;">
                TechCorp Portal
            </h4>
            <p style="color:rgba(255,255,255,0.5);
                      font-size:13px; margin:0;">
                Sign in with your employee credentials
            </p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(
            with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

    

        <!-- Login form -->
        <form method="POST" action="{{ url_for('login_post') }}">

            <div class="mb-3">
                <label style="font-size:13px;
                              color:rgba(255,255,255,0.7);
                              margin-bottom:6px;
                              display:block;">
                    Username
                </label>
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter your username"
                       required>
            </div>

            <div class="mb-4">
                <label style="font-size:13px;
                              color:rgba(255,255,255,0.7);
                              margin-bottom:6px;
                              display:block;">
                    Password
                </label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       required>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Sign In
            </button>

        </form>

        

    </div>
</body>
</html>
